name: docpilot-demo

services:
  mysql:
    image: mysql:8.0.37
    container_name: docpilot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: docpilot
      MYSQL_USER: docpilot
      MYSQL_PASSWORD: docpilot
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - docpilot_mysql_data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.5
    container_name: docpilot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - docpilot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: docpilot-rocketmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    volumes:
      - docpilot_rocketmq_namesrv_logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: docpilot-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    volumes:
      - ./deploy/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf:ro
      - docpilot_rocketmq_broker_logs:/home/rocketmq/logs
      - docpilot_rocketmq_broker_store:/home/rocketmq/store

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: docpilot-rocketmq-dashboard
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8088:8080"

  minio:
    image: minio/minio:RELEASE.2026-03-27T17-42-56Z
    container_name: docpilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - docpilot_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: docpilot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - docpilot_prometheus_data:/prometheus

volumes:
  docpilot_mysql_data:
  docpilot_redis_data:
  docpilot_rocketmq_namesrv_logs:
  docpilot_rocketmq_broker_logs:
  docpilot_rocketmq_broker_store:
  docpilot_minio_data:
  docpilot_prometheus_data:

